<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BR3HEYH82C"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BR3HEYH82C');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otimização de Custos Logísticos Industriais</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #030305; color: #e2e8f0; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        h1, h2, h3, .cyber-font { font-family: 'Rajdhani', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #00f0ff; cursor: pointer; margin-top: -8px; box-shadow: 0 0 10px #00f0ff; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: rgba(255,255,255,0.1); border-radius: 2px; }
        input[type=range]:focus { outline: none; }
        .neon-text { text-shadow: 0 0 5px rgba(0, 240, 255, 0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 relative bg-gradient-to-br from-slate-950 to-blue-950">
    
    <main class="w-full max-w-3xl glass-panel rounded-2xl p-6 md:p-10 relative">
        <header class="text-center mb-8 border-b border-slate-800 pb-6">
            <h1 class="text-3xl md:text-5xl font-bold text-white mb-2 cyber-font neon-text uppercase">Otimização de Custos Logísticos Industriais</h1>
            <p class="text-cyan-400 text-sm tracking-widest cyber-font">MÓDULO B2B AUTÔNOMO v4.0</p>
        </header>
        
        <div class="w-full min-h-[90px] bg-black/40 border border-slate-800 rounded mb-8 flex justify-center">
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1243114536236949" data-ad-slot="1234567890" data-ad-format="auto"></ins>
        </div>

        <div id="form-area" class="space-y-6">
            <div>
      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Custo de Transporte</label>
        <span class='text-sm font-mono text-white' id='custo_transporte-val'>0</span>
      </div>
      <input type='range' id='custo_transporte' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('custo_transporte')">

      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Custo de Armazenagem</label>
        <span class='text-sm font-mono text-white' id='custo_armazenagem-val'>0</span>
      </div>
      <input type='range' id='custo_armazenagem' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('custo_armazenagem')">

      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Custo de Mão de Obra</label>
        <span class='text-sm font-mono text-white' id='custo_mao_obra-val'>0</span>
      </div>
      <input type='range' id='custo_mao_obra' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('custo_mao_obra')">

      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Custo de Equipamentos</label>
        <span class='text-sm font-mono text-white' id='custo_equipamentos-val'>0</span>
      </div>
      <input type='range' id='custo_equipamentos' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('custo_equipamentos')">

      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Custo de Manutenção</label>
        <span class='text-sm font-mono text-white' id='custo_manutencao-val'>0</span>
      </div>
      <input type='range' id='custo_manutencao' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('custo_manutencao')">

      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Distância de Transporte</label>
        <span class='text-sm font-mono text-white' id='distancia_transporte-val'>0</span>
      </div>
      <input type='range' id='distancia_transporte' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('distancia_transporte')">

      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Peso do Carga</label>
        <span class='text-sm font-mono text-white' id='peso_carga-val'>0</span>
      </div>
      <input type='range' id='peso_carga' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('peso_carga')">

      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Volume do Carga</label>
        <span class='text-sm font-mono text-white' id='volume_carga-val'>0</span>
      </div>
      <input type='range' id='volume_carga' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('volume_carga')">

      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Eficiência do Equipamento</label>
        <span class='text-sm font-mono text-white' id='eficiencia_equipamento-val'>0</span>
      </div>
      <input type='range' id='eficiencia_equipamento' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('eficiencia_equipamento')">

      <div class='flex justify-between mb-1'>
        <label class='text-xs font-bold text-cyan-300 uppercase'>Nível de Serviço</label>
        <span class='text-sm font-mono text-white' id='nivel_servico-val'>0</span>
      </div>
      <input type='range' id='nivel_servico' min='0' max='1000' step='1' value='0' oninput="updateSliderValue('nivel_servico')">

   </div>
            <button id="btn-calc" class="w-full mt-6 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-lg uppercase tracking-wider cyber-font transition-colors shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                PROCESSAR DADOS
            </button>
        </div>

        <div id="loading-area" class="hidden py-16 text-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-cyan-500 mx-auto mb-4"></div>
            <p class="cyber-font text-cyan-400 animate-pulse">SINTETIZANDO INFORMAÇÕES GLOBAIS...</p>
        </div>

        <div id="result-area" class="hidden mt-6 opacity-0 transition-opacity duration-1000">
            <div class="bg-black/50 border border-slate-700 p-6 rounded-xl text-center mb-6">
                <h2 class="text-sm text-slate-400 uppercase cyber-font mb-2">Resultado Final</h2>
                <div id="resultado-valor" class="text-4xl font-bold text-white cyber-font mb-4"></div>
                <div class="w-full bg-slate-900 p-2 rounded-lg mb-4"><canvas id="grafico-ia"></canvas></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <a href="" target="_blank" class="block p-4 bg-emerald-900/20 border border-emerald-500/50 hover:bg-emerald-900/40 rounded-lg transition-colors">
                    <span class="block text-xs text-emerald-400 font-bold cyber-font mb-1">ECONOMIA DE TAXAS</span>
                    <span class="block text-sm text-white">Abra sua Conta Global (Sem IOF)</span>
                </a>
                
                <a href="" target="_blank" class="block p-4 bg-blue-900/20 border border-blue-500/50 hover:bg-blue-900/40 rounded-lg transition-colors">
                    <span class="block text-xs text-blue-400 font-bold cyber-font mb-1">HOSPEDAGEM CLOUD</span>
                    <span class="block text-sm text-white">Ganhe US$ 200 em Créditos de Servidor</span>
                </a>
            </div>

            <div class="w-full p-4 border border-slate-800 bg-black/30 rounded-lg text-center mb-6">
                <span class="text-xs text-slate-500 block mb-2">Recomendação Técnica:</span>
                <div class="h-[90px] bg-slate-900 flex items-center justify-center text-xs text-slate-600">[Espaço Banner Amazon]</div>
            </div>

            <button onclick="location.reload()" class="w-full py-3 border border-slate-700 text-slate-400 hover:text-white rounded-lg text-sm cyber-font">NOVA SIMULAÇÃO</button>
        </div>
    </main>

    <script>
        function updateSliderValue(id) { const s=document.getElementById(id), d=document.getElementById(id+'-val'); if(s&&d) d.innerText=s.value; }
        document.getElementById('btn-calc').addEventListener('click', function() {
            document.getElementById('form-area').classList.add('hidden');
            document.getElementById('loading-area').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('loading-area').classList.add('hidden');
                const r = document.getElementById('result-area');
                r.classList.remove('hidden');
                requestAnimationFrame(() => { r.style.opacity = '1'; try { executarCalculosIA(); } catch(e) { document.getElementById('resultado-valor').innerHTML="Erro."; } });
            }, 4500);
        });
        var JAVASCRIPT_IA; function updateSliderValue(id) { document.getElementById(id + '-val').innerHTML = document.getElementById(id).value; }
   function executarCalculosIA() { 
      let custo_transporte = parseInt(document.getElementById('custo_transporte').value);
      let custo_armazenagem = parseInt(document.getElementById('custo_armazenagem').value);
      let custo_mao_obra = parseInt(document.getElementById('custo_mao_obra').value);
      let custo_equipamentos = parseInt(document.getElementById('custo_equipamentos').value);
      let custo_manutencao = parseInt(document.getElementById('custo_manutencao').value);
      let distancia_transporte = parseInt(document.getElementById('distancia_transporte').value);
      let peso_carga = parseInt(document.getElementById('peso_carga').value);
      let volume_carga = parseInt(document.getElementById('volume_carga').value);
      let eficiencia_equipamento = parseInt(document.getElementById('eficiencia_equipamento').value);
      let nivel_servico = parseInt(document.getElementById('nivel_servico').value);

      let resultado = (custo_transporte + custo_armazenagem + custo_mao_obra + custo_equipamentos + custo_manutencao) * (distancia_transporte + peso_carga + volume_carga) / (eficiencia_equipamento + nivel_servico);
      document.getElementById('resultado-valor').innerHTML = 'R$ ' + resultado.toFixed(2);

      new Chart(document.getElementById('grafico-ia'), { 
         type: 'doughnut', 
         data: { 
            labels: ['Custo Total', 'Eficiência'], 
            datasets: [{ 
               data: [resultado, eficiencia_equipamento + nivel_servico], 
               backgroundColor: ['#ef4444', '#06b6d4'] 
            }] 
         } 
      });
   }
    </script>
</body>
</html>
