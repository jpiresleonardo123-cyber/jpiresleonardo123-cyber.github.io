    <div>

        <span class='text-sm font-mono text-white' id='salario_encargos_motorista_anual-val'>0</span>
      </div>
      <input type='range' id='salario_encargos_motorista_anual' min='0' max='100000' step='100' value='0' oninput='updateSliderValue("salario_encargos_motorista_anual")'>

        <span class='text-sm font-mono text-white' id='custos_admin_alocados_anual-val'>0</span>
      </div>

        <span class='text-sm font-mono text-white' id='custo_patio_anual-val'>0</span>
      </div>

        <span class='text-sm font-mono text-white' id='custo_dia_parado_estimado-val'>0</span>
      </div>

    <button onclick='executarCalculosIA()'>Calcular</button>
    <p id='resultado-valor'>R$ 0</p>
    <canvas id='grafico-ia'></canvas>
            
            <button id="btn-calc" class="w-full mt-8 bg-gradient-to-r from-cyan-600 to-blue-700 hover:from-cyan-500 hover:to-blue-600 text-white font-bold py-4 rounded-xl text-lg uppercase tracking-widest shadow-[0_0_20px_rgba(0,195,255,0.3)] hover:shadow-[0_0_30px_rgba(0,195,255,0.6)] transition-all duration-300 transform hover:-translate-y-1">
                EXECUTAR REDE NEURAL
            </button>
        </div>

        <!-- TELA DE PROCESSAMENTO (EFEITO ZEIGARNIK / LABOUR ILLUSION) -->
        <div id="loading-area" class="hidden py-16 flex flex-col items-center justify-center">
            <div class="relative w-24 h-24 mb-6">
                <div class="absolute inset-0 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
                <div class="absolute inset-2 border-4 border-purple-500/20 border-b-purple-500 rounded-full animate-spin animate-reverse" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
            </div>
            <h3 class="cyber-font text-xl text-cyan-400 font-bold mb-2 animate-pulse">SINTETIZANDO DADOS GLOBAIS</h3>
            <p class="text-xs text-slate-500 font-mono" id="loading-text">Conectando aos servidores matriz...</p>
            
            <div class="w-full max-w-xs mt-6 bg-slate-900 h-1.5 rounded-full overflow-hidden border border-slate-800">
                <div id="bar" class="w-0 h-full bg-gradient-to-r from-cyan-500 to-blue-500 transition-all duration-[4500ms] ease-linear shadow-[0_0_10px_#00f0ff]"></div>

        </div>

        <!-- RESULTADO E GRÁFICO (RECOMPENSA NEUROLÓGICA) -->
        <div id="result-area" class="hidden mt-4 opacity-0 transition-opacity duration-1000">
            <div class="bg-black/40 border border-slate-700 p-6 md:p-8 rounded-xl text-center relative overflow-hidden">
                <div class="absolute top-0 right-0 p-2 opacity-20"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
                
                <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2 cyber-font">Diagnóstico Calculado</h2>
                <div id="resultado-valor" class="text-4xl md:text-5xl font-black text-white cyber-font mb-8 neon-text"></div>
                
                <!-- CANVAS DO GRÁFICO DA IA -->

            </div>
            
            <button onclick="location.reload()" class="w-full mt-6 py-3 border border-slate-700 hover:border-cyan-500 text-slate-400 hover:text-cyan-400 rounded-lg uppercase tracking-widest text-xs font-bold transition-colors">

    <script>
        // Lógica de Retenção Visual e Atualização de Sliders em Tempo Real
        function updateSliderValue(id) {
            const slider = document.getElementById(id);
            const display = document.getElementById(id + '-val');
            if(slider && display) display.innerText = slider.value;
        }

        document.getElementById('btn-calc').addEventListener('click', function() {
            // Esconde Form, Mostra Loader
            document.getElementById('form-area').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('form-area').classList.add('hidden');
                document.getElementById('loading-area').classList.remove('hidden');
                
                // Animações Psicológicas
                setTimeout(() => { document.getElementById('bar').style.width = '100%'; }, 50);
                
                const texts = ["Consultando matriz de mercado...", "Processando algoritmos B2B...", "Renderizando diagnóstico..."];
                let t = 0;
                const textInt = setInterval(() => {
                    document.getElementById('loading-text').innerText = texts[t];
                    t++; if(t >= texts.length) clearInterval(textInt);
                }, 1300);

                // Libera o Resultado após 4.5s
                setTimeout(() => {
                    document.getElementById('loading-area').classList.add('hidden');
                    const resultArea = document.getElementById('result-area');
                    resultArea.classList.remove('hidden');
                    // Força a renderização do display flex/block antes de animar a opacidade
                    requestAnimationFrame(() => {
                        resultArea.style.opacity = '1';
                        // RODA O CÓDIGO DA IA
                        try { executarCalculosIA(); } catch(e) { console.error(e); document.getElementById('resultado-valor').innerHTML = "Erro Sistêmico."; }
                    });
                }, 4500);
            }, 500);
        });

        // O bloco abaixo é substituído pelo Python
        function updateSliderValue(id) {
      document.getElementById(id + '-val').innerHTML = document.getElementById(id).value;
    }

    function executarCalculosIA() {
      var preco_compra = parseFloat(document.getElementById('preco_compra').value);
      var valor_residual = parseFloat(document.getElementById('valor_residual').value);
      var vida_util_anos = parseFloat(document.getElementById('vida_util_anos').value);
      var taxa_juros_anual_capital = parseFloat(document.getElementById('taxa_juros_anual_capital').value);
      var distancia_anual_km = parseFloat(document.getElementById('distancia_anual_km').value);
      var consumo_l_por_km = parseFloat(document.getElementById('consumo_l_por_km').value);
      var preco_litro_combustivel = parseFloat(document.getElementById('preco_litro_combustivel').value);
      var custo_manutencao_km = parseFloat(document.getElementById('custo_manutencao_km').value);
      var custo_pneus_km = parseFloat(document.getElementById('custo_pneus_km').value);
      var custo_fluidos_km = parseFloat(document.getElementById('custo_fluidos_km').value);
      var premio_seguro_anual = parseFloat(document.getElementById('premio_seguro_anual').value);
      var impostos_taxas_anuais = parseFloat(document.getElementById('impostos_taxas_anuais').value);
      var salario_encargos_motorista_anual = parseFloat(document.getElementById('salario_encargos_motorista_anual').value);
      var custos_admin_alocados_anual = parseFloat(document.getElementById('custos_admin_alocados_anual').value);
      var custo_patio_anual = parseFloat(document.getElementById('custo_patio_anual').value);
      var custo_dia_parado_estimado = parseFloat(document.getElementById('custo_dia_parado_estimado').value);
      var dias_parados_anual = parseFloat(document.getElementById('dias_parados_anual').value);

      var c_depreciacao = (preco_compra - valor_residual) / vida_util_anos;
      var c_financiamento = preco_compra * taxa_juros_anual_capital;
      var c_variaveis_operacionais = distancia_anual_km * (consumo_l_por_km * preco_litro_combustivel + custo_manutencao_km + custo_pneus_km + custo_fluidos_km);
      var c_fixos_anuais = premio_seguro_anual + impostos_taxas_anuais + salario_encargos_motorista_anual + custos_admin_alocados_anual + custo_patio_anual;
      var c_indiretos = custo_dia_parado_estimado * dias_parados_anual;

      var c_anual_caminhao = c_depreciacao + c_financiamento + c_variaveis_operacionais + c_fixos_anuais + c_indiretos;

      document.getElementById('resultado-valor').innerHTML = 'R$ ' + c_anual_caminhao.toFixed(2);

      new Chart(document.getElementById('grafico-ia'), {
        type: 'doughnut',
        data: {
          labels: ['Custo', 'Lucro'],
          datasets: [{
            data: [c_anual_caminhao, 0],
            backgroundColor: ['#ef4444', '#06b6d4']
          }]
        }
      });
    }
    </script>
</body>
